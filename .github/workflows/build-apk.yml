name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename APK to oir-pro.apk
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/oir-pro.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-pro-apk
          path: build/app/outputs/flutter-apk/oir-pro.apk

      - name: Upload obfuscation symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-pro-debug-symbols
          path: build/debug-info

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Oír Pro v${{ github.run_number }}
          files: build/app/outputs/flutter-apk/oir-pro.apk
          body: |
            Oír Pro — APK de Servicio Técnico generada automáticamente.
            Bajá `oir-pro.apk` al celular e instalá.
