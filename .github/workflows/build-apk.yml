name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apk_name:
        description: 'Nombre del archivo APK a descargar (sin .apk). Ej: oir-pro-juan. Vacio = oir-pro'
        required: false
        default: 'oir-pro'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      # Determina el nombre del APK de salida. En build manual (workflow_dispatch)
      # usa el nombre que escribas en el campo `apk_name`. En push automatico
      # (o si el campo queda vacio) usa el default `oir-pro`. Se sanitiza para
      # dejar solo caracteres seguros de nombre de archivo.
      - name: Determine APK name
        run: |
          RAW="${{ github.event.inputs.apk_name }}"
          if [ -z "$RAW" ]; then
            RAW="oir-pro"
          fi
          SAFE=$(echo "$RAW" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')
          if [ -z "$SAFE" ]; then
            SAFE="oir-pro"
          fi
          echo "APK_NAME=$SAFE" >> "$GITHUB_ENV"
          echo "APK de salida: $SAFE.apk"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
      
      - name: Get dependencies
        run: flutter pub get

      # Spec oir-pro-rebrand-harden-and-remote-config — Fase 4 (R4.3, R4.6).
      # Si falta cualquier secret, el build aborta antes de tocar Gradle.
      # No queremos caer silenciosamente a la debug key.
      - name: Validate keystore secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::Falta el secret KEYSTORE_BASE64. Ver hearing_aid_app/android/KEYSTORE_GUIDE.md."
            exit 1
          fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "::error::Falta el secret KEYSTORE_PASSWORD."
            exit 1
          fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "::error::Falta el secret KEY_ALIAS."
            exit 1
          fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "::error::Falta el secret KEY_PASSWORD."
            exit 1
          fi

      # Spec oir-pro-patient-mode — Fase 1 (R3.2, R3.3).
      # Sin HMAC_SECRET el `BundleExporter` falla en runtime con
      # `StateError`. Validamos antes de buildear para que el error
      # sea visible en CI y no en la APK ya distribuida.
      - name: Validate HMAC_SECRET
        run: |
          if [ -z "${{ secrets.HMAC_SECRET }}" ]; then
            echo "::error::Falta el secret HMAC_SECRET. Sin él, BundleExporter falla en runtime."
            exit 1
          fi

      # Spec oir-pro-rebrand-harden-and-remote-config — Fase 4 (R4.3).
      # Decodifica el base64 del secret a android/app/oirpro-release.jks.
      # Esa misma ruta es la que referencia key.properties (storeFile=oirpro-release.jks),
      # que Gradle resuelve relativo al modulo `app`.
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/oirpro-release.jks
          ls -la android/app/oirpro-release.jks

      # Spec oir-pro-rebrand-harden-and-remote-config — Fase 4 (R4.3).
      # Genera android/key.properties con las credenciales reales que
      # build.gradle lee al configurar signingConfigs.release.
      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=oirpro-release.jks
          EOF

      - name: Build APK
        # NOTA: --obfuscate rompe el denoiser DNN (los símbolos que resuelve
        # dlsym/JNI quedan mangleados y el motor nativo crashea al arrancar).
        # Por eso se compila SIN ofuscar (igual que el build local que funciona).
        run: flutter build apk --release --dart-define=HMAC_SECRET=${{ secrets.HMAC_SECRET }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/${APK_NAME}.apk"
          ls -la "build/app/outputs/flutter-apk/${APK_NAME}.apk"

      # Upload del APK como artifact descargable desde Actions.
      # continue-on-error: si la cuota de storage está llena, el build sigue
      # verde y el APK queda disponible en Releases igualmente.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ${{ env.APK_NAME }}
          path: build/app/outputs/flutter-apk/${{ env.APK_NAME }}.apk

      - name: Upload obfuscation symbols artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: oir-pro-debug-symbols
          path: build/debug-info

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Oír Pro v${{ github.run_number }} (${{ env.APK_NAME }})
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}.apk
          body: |
            Oír Pro — APK de Servicio Técnico generada automáticamente.
            Bajá `${{ env.APK_NAME }}.apk` al celular e instalá.
