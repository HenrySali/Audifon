plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.psk.hearing_aid_app"
    compileSdk = 34
    ndkVersion = "25.2.9519653"

    buildFeatures {
        prefab true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId = "com.psk.hearing_aid_app"
        minSdk = 24
        targetSdk = 34
        versionCode = 1
        versionName = "1.0.0"

        // Configuración NDK para compilación C++ del DSP pipeline
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }

        // CMake para compilar código C++ nativo (DSP pipeline)
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O2 -ffast-math"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    // Configuración de CMake para el pipeline DSP nativo
    externalNativeBuild {
        cmake {
            path = file("src/main/cpp/CMakeLists.txt")
            version = "3.22.1"
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation 'com.google.oboe:oboe:1.9.0'
}
