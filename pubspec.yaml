name: hearing_aid_app
description: Aplicación PSK Mobile Hearing Aid - Amplificador de sonido personal (PSAP) con DSP nativo
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.0.1
  wakelock_plus: ^1.2.8
  webview_flutter: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  glados: ^1.1.1
  bloc_test: ^9.1.4
  mocktail: ^1.0.1

dependency_overrides:
  analyzer: ">=6.0.0 <14.0.0"
  objective_c: 4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/simulator/
