name: hearing_aid_app
description: Aplicación PSK Mobile Hearing Aid - Amplificador de sonido personal (PSAP) con DSP nativo
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.0.1
  wakelock_plus: ^1.2.8
  url_launcher: ^6.2.1
  just_audio: ^0.9.36
  flutter_tts: ^4.0.2
  http: ^1.2.0
  # Calibración del micrófono: SHA-256 del payload persistido en
  # `mic_calibration_box` para audit trail (ANMAT 2318/02 — Decreto 4725/05).
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  glados: ^1.1.1
  bloc_test: ^9.1.4
  mocktail: ^1.0.1

dependency_overrides:
  analyzer: ">=6.0.0 <14.0.0"
  objective_c: 4.0.0
  # path_provider_foundation 2.5.x requires objective_c >=8.0,
  # but our project pins objective_c to 4.0.0 for compatibility with
  # other plugins. 2.4.x is the last release compatible with objective_c 4.x.
  # Note: path_provider_foundation is iOS/macOS-only; this version pin
  # does NOT affect Android behavior, only ensures the kernel snapshot
  # compiles when the foundation plugin is present in the deps tree.
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/simulator/
