name: hearing_aid_app
description: Aplicación PSK Mobile Hearing Aid - Amplificador de sonido personal (PSAP) con DSP nativo
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.0.1
  wakelock_plus: ^1.2.8
  url_launcher: ^6.2.1
  just_audio: ^0.9.36
  flutter_tts: ^4.0.2
  http: ^1.2.0
  # Calibración del micrófono: SHA-256 del payload persistido en
  # `mic_calibration_box` para audit trail (ANMAT 2318/02 — Decreto 4725/05).
  crypto: ^3.0.3
  # Biometría al abrir (Fase 3 spec oir-pro-rebrand-harden-and-remote-config):
  # huella dactilar / face unlock con fallback a PIN local. Requiere
  # MainActivity extendiendo FlutterFragmentActivity y permisos
  # USE_BIOMETRIC / USE_FINGERPRINT en el manifest.
  local_auth: ^2.3.0
  # Spec oir-pro-patient-mode — Fase 2 (BundleExporter):
  # `share_plus` dispara el share sheet de Android para enviar el
  # `.oirpro.json` por WhatsApp / email / Bluetooth. `path_provider`
  # resuelve `Downloads/` (con fallback a tmp) para guardar el archivo
  # antes de compartir.
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  # In-app diagnostic analyzer charts (spec in-app-diagnostic-analyzer).
  fl_chart: ^0.68.0
  # In-app diagnostic analyzer file picker for the technician variant.
  file_picker: ^8.0.0
  # BLE proprietary protocol with the in-house hearing-aid chip (NOT the
  # commercial A2DP/SCO headset). Used by `lib/data/repositories/ble_repository.dart`
  # to send EQ / AGC / volume / profile / MPO / NR / FB-cancel commands
  # over the GATT custom service (UUID 0x1850-custom). The package author
  # explicitly recommends pinning a fixed version because minor-version
  # bumps may include breaking API changes (semver: MAJOR = breaking API).
  #
  # 2026-XX downgrade 1.36.8 → 1.35.5 (CI build-apk fix):
  # `flutter_blue_plus 1.36.x` is federated and pulls
  # `flutter_blue_plus_android@7.0.x`, whose
  # `android/build.gradle` evaluates `compileSdkVersion = flutter.compileSdkVersion`
  # at line 7. Under our toolchain (AGP 8.3.2 / compileSdk 34, Flutter
  # Gradle plugin loaded via `dev.flutter.flutter-gradle-plugin` in
  # `android/settings.gradle`), Gradle resolves `flutter` as a property
  # of the `LibraryExtension` (the consuming sub-project) instead of as
  # the global `flutter` extension defined by the Flutter plugin, and
  # the build fails with:
  #   > Could not get unknown property 'flutter' for extension 'android'
  #   > of type com.android.build.gradle.LibraryExtension.
  #   > compileSdkVersion is not specified.
  # Pin 1.35.5 (last patch of the 1.35.x series) until we bump AGP /
  # compileSdk to a version that wires the `flutter` extension into
  # library sub-projects automatically.
  # NOTE: 1.35.5 is ALSO federated (depends on `flutter_blue_plus_android:
  # ^4.0.0`). The downgrade resolves to flutter_blue_plus_android 4.x,
  # whose `android/build.gradle` uses a hard-coded `compileSdkVersion`
  # rather than the `flutter.compileSdkVersion` lookup, so it builds
  # cleanly under AGP 8.3.2.
  # Validated against 1136 unit tests in this repo.
  # Source: pub.dev changelog (jamcorder.com publisher, accessed
  # 2026-06-11).
  # Manifest permissions BLUETOOTH_CONNECT, BLUETOOTH_SCAN
  # (neverForLocation) are already declared in
  # android/app/src/main/AndroidManifest.xml.
  flutter_blue_plus: 1.35.5
  # PDF generation for the QC loopback audit trail report (spec
  # `audiogram-driven-presets`, tarea 15.3, Req 15.14). Used by
  # `lib/data/repositories/qc_audit_repository_impl.dart` to render the
  # operator + equipment + measurements + signature block as an A4 PDF
  # whose bytes the release_gate verifies. We do NOT add `package:printing`
  # because the report is saved-to-bytes only (never sent to a physical
  # printer from the technician app).
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  # `integration_test/e2e_integration_test.dart` imports
  # `package:integration_test/integration_test.dart` to drive the BLE
  # end-to-end suite on physical devices. Shipped with the Flutter SDK
  # (no version, only `sdk: flutter` — same pattern as `flutter_test`).
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  glados: ^1.1.1
  bloc_test: ^9.1.4
  mocktail: ^1.0.1

dependency_overrides:
  analyzer: ">=6.0.0 <14.0.0"
  objective_c: 4.0.0
  # win32 5.4.0: versión compatible con Dart 3.3 (Flutter 3.19.6 del CI)
  # que expone COINIT, WIN32_ERROR y EXECUTION_STATE requeridos por
  # file_picker 8.0.5 y wakelock_plus 1.2.5. Versiones >= 5.5.x requieren
  # Dart 3.4+ (no disponible en Flutter 3.19.6).
  win32: 5.4.0
  file_picker: 8.0.5
  wakelock_plus: 1.2.5
  # path_provider_foundation 2.5.x requires objective_c >=8.0,
  # but our project pins objective_c to 4.0.0 for compatibility with
  # other plugins. 2.4.x is the last release compatible with objective_c 4.x.
  # Note: path_provider_foundation is iOS/macOS-only; this version pin
  # does NOT affect Android behavior, only ensures the kernel snapshot
  # compiles when the foundation plugin is present in the deps tree.
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/simulator/
  # Roboto Regular + Bold (Apache License 2.0) bundled for `package:pdf`
  # so the QC loopback audit-trail report renders Spanish accents
  # (á é í ó ú ñ ¿ ¡) correctly in operator names, patient names, and
  # notes. The PDF default Helvetica is a Type1 font with no Unicode
  # support — every accented codepoint becomes a `?` or empty box,
  # which would silently corrupt regulatory audit records.
  #
  # Source / license:
  #   - upstream:    https://github.com/googlefonts/roboto-2
  #   - license:     Apache-2.0 (file `LICENSE` in repo root, Fedora
  #                  packages page also confirms `Apache-2.0 AND CC0-1.0`)
  #   - downloaded:  src/hinted/Roboto-Regular.ttf (515 KB)
  #                  src/hinted/Roboto-Bold.ttf    (514 KB)
  #
  # We declare these under `flutter.fonts` (NOT `flutter.assets`) on
  # purpose: declaring under `fonts` registers the asset path with
  # `rootBundle` AND the Flutter font resolver, while declaring under
  # `assets` registers only with `rootBundle`. Either path makes
  # `await rootBundle.load('assets/fonts/Roboto-Regular.ttf')` work,
  # but `fonts:` is the canonical place. See:
  # https://docs.flutter.dev/cookbook/design/fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
